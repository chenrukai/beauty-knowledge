
services:
  mysql:
    image: mysql:8.0
    container_name: beauty-mysql
    restart: unless-stopped
    command:
      - --ngram_token_size=2
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: beauty_knowledge
    ports:
      - "3306:3306"
    volumes:
      - beauty-mysql-data:/var/lib/mysql
      - ./sql/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -proot"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - beauty-net

  redis:
    image: redis:7.0-alpine
    container_name: beauty-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - beauty-redis-data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping | grep -q PONG"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - beauty-net

  rabbitmq:
    image: rabbitmq:3.12-management
    container_name: beauty-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: beauty
      RABBITMQ_DEFAULT_PASS: beauty123
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - beauty-rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - beauty-net

  minio:
    image: minio/minio:latest
    container_name: beauty-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: beauty
      MINIO_ROOT_PASSWORD: beauty123456
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - beauty-minio-data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9000/minio/health/live || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - beauty-net

  etcd:
    image: quay.io/coreos/etcd:v3.5.5
    container_name: beauty-etcd
    restart: unless-stopped
    command: >
      /usr/local/bin/etcd
      --name etcd
      --data-dir /etcd
      --listen-client-urls http://0.0.0.0:2379
      --advertise-client-urls http://etcd:2379
    environment:
      ETCDCTL_API: "3"
    ports:
      - "2379:2379"
    volumes:
      - beauty-etcd-data:/etcd
    healthcheck:
      test: ["CMD-SHELL", "ETCDCTL_API=3 etcdctl --endpoints=http://localhost:2379 endpoint health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - beauty-net

  milvus:
    image: milvusdb/milvus:v2.5.4
    container_name: beauty-milvus
    restart: unless-stopped
    command: ["milvus", "run", "standalone"]
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
    depends_on:
      etcd:
        condition: service_healthy
      minio:
        condition: service_healthy
    ports:
      - "19530:19530"
    volumes:
      - beauty-milvus-data:/var/lib/milvus
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9091/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 40s
    networks:
      - beauty-net

networks:
  beauty-net:
    driver: bridge

volumes:
  beauty-mysql-data:
  beauty-redis-data:
  beauty-rabbitmq-data:
  beauty-minio-data:
  beauty-etcd-data:
  beauty-milvus-data:
