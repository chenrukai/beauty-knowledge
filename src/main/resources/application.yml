spring:
  profiles:
    active: dev
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai

mybatis-plus:
  mapper-locations: classpath:mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto

beauty:
  jwt:
    secret: ${BEAUTY_JWT_SECRET:}
    expire-in-seconds: 86400
  llm:
    provider: ${BEAUTY_LLM_PROVIDER:ollama}
    ollama:
      base-url: ${BEAUTY_OLLAMA_BASE_URL:http://localhost:11434}
      model: ${BEAUTY_OLLAMA_MODEL:qwen2.5:7b}
      timeout: ${BEAUTY_OLLAMA_TIMEOUT:30000}
    qwen:
      base-url: ${BEAUTY_QWEN_BASE_URL:https://dashscope.aliyuncs.com/compatible-mode/v1}
      api-key: ${BEAUTY_QWEN_API_KEY:}
      model: ${BEAUTY_QWEN_MODEL:qwen-max}
      timeout: ${BEAUTY_QWEN_TIMEOUT:30000}
  minio:
    bucket-name: ${BEAUTY_MINIO_BUCKET_NAME:beauty-knowledge}
  cors:
    allowed-origins: ${BEAUTY_CORS_ALLOWED_ORIGINS:http://localhost:5173}

logging:
  level:
    com.beauty.knowledge: debug
