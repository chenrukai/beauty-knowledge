spring:
  profiles:
    active: dev
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai

mybatis-plus:
  mapper-locations: classpath:mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto

beauty:
  jwt:
    secret: ${BEAUTY_JWT_SECRET:}
    expire-in-seconds: 86400

logging:
  level:
    com.beauty.knowledge: debug
